<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修正后的网页布局</title>
<style>
    /* 基础页面样式设置 */
    body {
        margin: 0;
        padding: 0;
        background-color: #121212; /* 使用与原图相近的深色背景 */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center; /* 将侧边栏居中显示，方便观察 */
        align-items: center;
        height: 100vh;
    }

    /* 侧边栏（按钮容器）样式 */
    .sidebar-panel {
        background-color: #1a1a1a; /* 稍浅的深色容器 */
        padding: 24px;
        width: 320px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);

        /* =========================================
           【关键修复点 1】：使用 Flexbox 布局
           ========================================= */
        display: flex;
        flex-direction: column; /* 让子元素从上到下垂直排列 */

        /* =========================================
           【关键修复点 2】：使用 gap 属性设置间距
           这个属性专门用于设置 Flex 子元素之间的距离。
           它能完美解决组件“贴太近”的问题，观感立刻提升。
           ========================================= */
        gap: 16px; /* 设置两个区域之间有 16px 的垂直距离 */
    }

    /* 上方内容区域示例（图片里虚线框的部分） */
    .content-area-placeholder {
        border: 2px dashed #444;
        height: 60px;
        border-radius: 8px;
        margin-bottom: 8px; /* 这一行代码是为 placeholder 加的，实际代码中通常不需要 */
    }

    /* “拖拽删除”区域样式 */
    .trash-area {
        background-color: #212121; /* 区域背景色 */
        border: 2px dashed #ff4d4d; /* 红色虚线边框，与原图一致 */
        border-radius: 10px;
        padding: 20px;
        cursor: pointer;
        transition: background-color 0.2s, border-color 0.2s;
        
        /* 区域内部内容居中 */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* “拖拽删除”区域内的文本样式 */
    .trash-text {
        color: #ff4d4d; /* 红色文本，与原图一致 */
        font-size: 15px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px; /* 图标和文字之间的微小间距 */
    }

    /* “保存高清图片”按钮样式 */
    .save-button {
        background-color: #e60073; /* 亮粉色/玫红色背景，与原图一致 */
        color: white;
        border: none;
        border-radius: 10px;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        
        /* 按钮内部内容居中 */
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px; /* 图标和文字之间的微小间距 */
    }

    /* 按钮和区域的悬停交互效果（增加实用性） */
    .trash-area:hover {
        background-color: #2a2a2a;
        border-color: #ff6666;
    }

    .save-button:hover {
        background-color: #cc0066; /* 悬停时颜色加深 */
    }
</style>
</head>
<body>

    <div class="sidebar-panel">
        
        <div class="content-area-placeholder"></div>

        <div class="trash-area" id="trashArea">
            <span class="trash-text">
                🗑️ 拖拽删除 </span>
        </div>

        <button class="save-button" id="saveButton">
            📸 保存高清图片 </button>
        
    </div>

</body>
</html>
