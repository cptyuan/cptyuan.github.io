<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从夯到拉 - 自动存档版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --sidebar-bg: #1a1a1a;
            --color-1: #ff4444; --color-2: #ff8800; --color-3: #ffbb33;
            --color-4: #00C851; --color-5: #33b5e5; --color-6: #2BBBAD;
            --color-7: #aa66cc; --color-8: #555555;
            --delete-red: #d32f2f;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-main);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        #capture-area {
            width: 100%;
            max-width: 1150px;
            background: #000;
            padding: 30px;
        }

        #editable-title {
            color: #eee;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: bold;
            border: 1px dashed transparent;
            padding: 10px;
            outline: none;
        }
        #editable-title:hover { border-color: #444; background: rgba(255,255,255,0.03); }

        .tier-container { width: 100%; border: 1px solid #333; }
        .tier-row { display: flex; min-height: 90px; border-bottom: 1px solid #222; }
        .tier-label { width: 120px; min-width: 120px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; text-align: center; }

        .tier-dropzone {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.02);
            min-width: 200px;
        }

        .sidebar { width: 320px; min-width: 320px; background: var(--sidebar-bg); border-left: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        textarea#text-input { padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; min-height: 80px; font-family: inherit; margin-bottom: 10px; }
        
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-bottom: 5px; }
        .btn-add { background: #3f51b5; color: white; }
        .btn-img { background: #4caf50; color: white; }
        .btn-save { background: #e91e63; color: white; margin-top: 10px; }

        #pool { flex-grow: 1; border: 2px dashed #444; border-radius: 8px; background: #111; overflow-y: auto; display: flex; flex-wrap: wrap; padding: 12px; align-content: flex-start; gap: 10px; margin-bottom: 15px; }

        #trash-can { height: 60px; border: 2px solid var(--delete-red); color: var(--delete-red); display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        #trash-can.drag-over { background: var(--delete-red); color: white; }

        .item {
            width: 68px; height: 68px; background: #333; color: #fff; cursor: grab; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 0.7rem; border: 1px solid #555; overflow: hidden; text-align: center; padding: 4px; box-sizing: border-box;
        }
        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .r1 .tier-label { background: var(--color-1); }
        .r2 .tier-label { background: var(--color-2); }
        .r3 .tier-label { background: var(--color-3); }
        .r4 .tier-label { background: var(--color-4); }
        .r5 .tier-label { background: var(--color-5); }
        .r6 .tier-label { background: var(--color-6); }
        .r7 .tier-label { background: var(--color-7); }
        .r8 .tier-label { background: var(--color-8); color: white; }
    </style>
</head>
<body onload="loadData()">

    <div class="main-content">
        <div id="capture-area">
            <div id="editable-title" contenteditable="true" oninput="saveData()">点击修改标题</div>
            <div class="tier-container">
                <div class="tier-row r1" id="row-1"><div class="tier-label">惊为天人</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r2" id="row-2"><div class="tier-label">臻于化境</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r3" id="row-3"><div class="tier-label">可圈可点</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r4" id="row-4"><div class="tier-label">瑕不掩瑜</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r5" id="row-5"><div class="tier-label">平平无奇</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r6" id="row-6"><div class="tier-label">索然无味</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r7" id="row-7"><div class="tier-label">粗制滥造</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r8" id="row-8"><div class="tier-label">臭不可闻</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <textarea id="text-input" placeholder="输入名单(换行/逗号拆分)"></textarea>
        <button class="btn-add" onclick="processInput()">批量导入</button>
        <button class="btn-img" onclick="document.getElementById('file-input').click()">上传图片</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="addImageItem(event)">
        
        <p style="font-size: 0.8rem; color: #888;">备选池：</p>
        <div id="pool" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        
        <div id="trash-can" ondrop="deleteItem(event)" ondragover="allowDrop(event)" ondragenter="this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')">🗑️ 拖拽至此删除</div>

        <button class="btn-save" onclick="saveAsImage()">📸 保存高清图片</button>
        <button onclick="clearAll()" style="background:#444; color:#999; font-size:0.8rem;">🔄 彻底清空数据</button>
    </div>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        
        function drop(ev) {
            ev.preventDefault();
            document.getElementById('trash-can').classList.remove('drag-over');
            let data = ev.dataTransfer.getData("text");
            let target = ev.target;
            while (target && !target.classList.contains('tier-dropzone') && target.id !== 'pool') {
                target = target.parentElement;
            }
            if (target) {
                target.appendChild(document.getElementById(data));
                saveData(); // 拖拽后保存
            }
        }

        function deleteItem(ev) {
            ev.preventDefault();
            document.getElementById('trash-can').classList.remove('drag-over');
            let data = ev.dataTransfer.getData("text");
            document.getElementById(data).remove();
            saveData(); // 删除后保存
        }

        let idCounter = Date.now();
        function createItem(content, isImg = false, id = null) {
            const div = document.createElement('div');
            div.className = 'item';
            div.draggable = true;
            div.id = id || 'item-' + idCounter++;
            div.ondragstart = drag;
            div.dataset.isImg = isImg;
            div.oncontextmenu = (e) => { e.preventDefault(); if(confirm('删除？')){ div.remove(); saveData(); }};
            
            if(isImg) {
                const img = document.createElement('img');
                img.src = content;
                div.appendChild(img);
            } else {
                div.textContent = content;
            }
            return div;
        }

        function processInput() {
            const val = document.getElementById('text-input').value;
            if (!val) return;
            val.split(/[\n,，]+/).forEach(t => {
                if(t.trim()) document.getElementById('pool').appendChild(createItem(t.trim()));
            });
            document.getElementById('text-input').value = '';
            saveData();
        }

        function addImageItem(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('pool').appendChild(createItem(e.target.result, true));
                saveData();
            };
            reader.readAsDataURL(file);
        }

        // --- 核心逻辑：存档与读档 ---
        function saveData() {
            const data = {
                title: document.getElementById('editable-title').textContent,
                rows: {}
            };
            // 保存每个档位的内容
            document.querySelectorAll('.tier-row').forEach(row => {
                const rowId = row.id;
                data.rows[rowId] = [];
                row.querySelectorAll('.item').forEach(item => {
                    data.rows[rowId].push({
                        id: item.id,
                        content: item.dataset.isImg === 'true' ? item.querySelector('img').src : item.textContent,
                        isImg: item.dataset.isImg === 'true'
                    });
                });
            });
            // 保存备选池
            data.pool = [];
            document.querySelectorAll('#pool .item').forEach(item => {
                data.pool.push({
                    id: item.id,
                    content: item.dataset.isImg === 'true' ? item.querySelector('img').src : item.textContent,
                    isImg: item.dataset.isImg === 'true'
                });
            });
            localStorage.setItem('tierListData', JSON.stringify(data));
        }

        function loadData() {
            const raw = localStorage.getItem('tierListData');
            if (!raw) return;
            const data = JSON.parse(raw);
            document.getElementById('editable-title').textContent = data.title;
            
            // 恢复档位
            for (let rowId in data.rows) {
                const zone = document.querySelector(`#${rowId} .tier-dropzone`);
                data.rows[rowId].forEach(item => {
                    zone.appendChild(createItem(item.content, item.isImg, item.id));
