<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从夯到拉 - 完美修复版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --sidebar-bg: #1a1a1a;
            --color-1: #ff4444; --color-2: #ff8800; --color-3: #ffbb33;
            --color-4: #00C851; --color-5: #33b5e5; --color-6: #2BBBAD;
            --color-7: #aa66cc; --color-8: #555555;
            --delete-red: #d32f2f;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-main);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        #capture-area {
            width: 100%;
            max-width: 1150px;
            background: #000;
            padding: 20px;
        }

        /* 可编辑标题样式优化 */
        #editable-title {
            color: #eee;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: bold;
            border: 1px dashed transparent;
            padding: 5px;
            outline: none;
            cursor: text;
            transition: 0.3s;
        }
        #editable-title:hover {
            border-color: #444;
            background: rgba(255,255,255,0.03);
        }

        .tier-container { width: 100%; border: 1px solid #333; }
        .tier-row { display: flex; min-height: 90px; border-bottom: 1px solid #222; }
        .tier-label { width: 120px; min-width: 120px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: #000; padding: 10px; text-align: center; }
        .tier-dropzone { flex-grow: 1; display: flex; flex-wrap: wrap; align-content: flex-start; padding: 8px; background-color: rgba(255, 255, 255, 0.02); min-width: 200px; }

        .sidebar { width: 320px; min-width: 320px; background: var(--sidebar-bg); border-left: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea#text-input { padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; resize: vertical; min-height: 80px; }
        
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #3f51b5; color: white; }
        .btn-img { background: #4caf50; color: white; }
        .btn-save { background: #e91e63; color: white; margin-top: 10px; }

        #pool { flex-grow: 1; border: 2px dashed #444; border-radius: 8px; background: #111; overflow-y: auto; display: flex; flex-wrap: wrap; padding: 12px; align-content: flex-start; gap: 10px; margin-bottom: 15px; }

        #trash-can {
            height: 80px;
            border: 2px solid var(--delete-red);
            background: rgba(211, 47, 47, 0.1);
            color: var(--delete-red);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 15px; /* 保持间距修正 */
        }
        #trash-can.drag-over { background: var(--delete-red); color: white; transform: scale(1.02); }

        .item { width: 68px; height: 68px; background: #333; cursor: grab; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 0.7rem; border: 1px solid #555; overflow: hidden; text-align: center; padding: 4px; box-sizing: border-box; position: relative; color: #fff; }
        .item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .r1 .tier-label { background: var(--color-1); }
        .r2 .tier-label { background: var(--color-2); }
        .r3 .tier-label { background: var(--color-3); }
        .r4 .tier-label { background: var(--color-4); }
        .r5 .tier-label { background: var(--color-5); }
        .r6 .tier-label { background: var(--color-6); }
        .r7 .tier-label { background: var(--color-7); }
        .r8 .tier-label { background: var(--color-8); color: white; }
        .hint { font-size: 0.75rem; color: #666; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-content">
        <div id="capture-area">
            <div id="editable-title" contenteditable="true" onblur="saveData()">我的 Tier List</div>
            
            <div class="tier-container">
                <div class="tier-row r1" id="row-0"><div class="tier-label">惊为天人</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r2" id="row-1"><div class="tier-label">臻于化境</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r3" id="row-2"><div class="tier-label">可圈可点</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r4" id="row-3"><div class="tier-label">瑕不掩瑜</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r5" id="row-4"><div class="tier-label">平平无奇</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r6" id="row-5"><div class="tier-label">索然无味</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r7" id="row-6"><div class="tier-label">粗制滥造</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="tier-row r8" id="row-7"><div class="tier-label">臭不可闻</div><div class="tier-dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="input-group">
            <textarea id="text-input" placeholder="输入名单(换行/逗号拆分)"></textarea>
            <button class="btn-add" onclick="processInput()">批量添加文本</button>
            <button class="btn-img" onclick="document.getElementById('file-input').click()">添加图片素材</button>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="addImageItem(event)">
        </div>
        
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">备选素材池：</p>
        <div id="pool" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        
        <div id="trash-can" ondrop="deleteItem(event)" ondragover="allowDrop(event)" ondragenter="this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')">🗑️ 拖拽或右键删除</div>
        <p class="hint">右键点击素材也可直接删除</p>

        <button class="btn-save" onclick="saveAsImage()">📸 保存并下载图片</button>
        <button onclick="clearLocalStorage()" style="background:#444; color:#ccc; font-size:0.8rem; margin-top:5px;">🔄 重置整个页面</button>
    </div>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        
        function drop(ev) {
            ev.preventDefault();
            document.getElementById('trash-can').classList.remove('drag-over');
            var data = ev.dataTransfer.getData("text");
            var target = ev.target;
            while (target && !target.classList.contains('tier-dropzone') && target.id !== 'pool') {
                target = target.parentElement;
            }
            if (target && document.getElementById(data)) {
                target.appendChild(document.getElementById(data));
                saveData();
            }
        }

        function deleteItem(ev) {
            ev.preventDefault();
            document.getElementById('trash-can').classList.remove('drag-over');
            var data = ev.dataTransfer.getData("text");
            var el = document.getElementById(data);
            if (el) el.remove();
            saveData();
        }

        let idCounter = Date.now();
        function createItem(content, isImage = false, id = null) {
            const div = document.createElement('div');
            div.className = 'item';
            div.draggable = true;
            div.id = id || 'item-' + (idCounter++);
            div.dataset.isImage = isImage;
            div.ondragstart = drag;
            div.oncontextmenu = function(e) { e.preventDefault(); if(confirm('删除这个素材？')){ this.remove(); saveData(); }};
            if(isImage) {
                const img = document.createElement('img');
                img.src = content;
                div.appendChild(img);
            } else {
                div.textContent = content;
            }
            return div;
        }

        function processInput() {
            const rawValue = document.getElementById('text-input').value;
            if (!rawValue.trim()) return;
            rawValue.split(/[\n,，]+/).map(s => s.trim()).filter(s => s !== "").forEach(text => {
                document.getElementById('pool').appendChild(createItem(text));
            });
            document.getElementById('text-input').value = '';
            saveData();
        }

        function addImageItem(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('pool').appendChild(createItem(e.target.result, true));
                saveData();
            }
            reader.readAsDataURL(file);
        }

        function saveData() {
            const data = {
                title: document.getElementById('editable-title').textContent,
                rows: {},
                pool: []
            };
            document.querySelectorAll('.tier-row').forEach((row, index) => {
                const tierId = 'tier-' + index;
                data.rows[tierId] = [];
                row.querySelectorAll('.item').forEach(item => {
                    data.rows[tierId].push({
                        id: item.id,
                        content: item.dataset.isImage === 'true' ? item.querySelector('img').src : item.textContent,
                        isImage: item.dataset.isImage === 'true'
                    });
                });
            });
            document.querySelectorAll('#pool .item').forEach(item => {
                data.pool.push({
                    id: item.id,
                    content: item.dataset.isImage === 'true' ? item.querySelector('img').src : item.textContent,
                    isImage: item.dataset.isImage === 'true'
                });
            });
            localStorage.setItem('tierlist_v2', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('tierlist_v2');
            if (!saved) return;
            const data = JSON.parse(saved);
            
            // 恢复标题
            if(data.title) document.getElementById('editable-title').textContent = data.title;
            
            // 恢复行
            document.querySelectorAll('.tier-row').forEach((row, index) => {
                const tierId = 'tier-' + index;
                const zone = row.querySelector('.tier-dropzone');
                if (data.rows[tierId]) {
                    data.rows[tierId].forEach(item => {
                        zone.appendChild(createItem(item.content, item.isImage, item.id));
                    });
                }
            });
            // 恢复备选池
            data.pool.forEach(item => {
                document.getElementById('pool').appendChild(createItem(item.content, item.isImage, item.id));
            });
        }

        function clearLocalStorage() {
            if(confirm('确定要清空全部数据吗？')){
                localStorage.removeItem('tierlist_v2');
                location.reload();
            }
        }

        function saveAsImage() {
            // 保存前取消标题焦点，避免光标被录入
            document.getElementById('editable-title').blur();
            html2canvas(document.getElementById('capture-area'), {
                backgroundColor: "#0a0a0a",
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = document.getElementById('editable-title').textContent + '.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
